{% extends "catalog/base.html" %}

{% block content %}
  <h1>Delete Author</h1>
  <p>Are you sure you want to delete {{ author.first_name }} {{ author.last_name }}?</p>

  <form method="post">
    {% csrf_token %}
    <input type="submit" value="Yes, delete">
    <a href="{% url 'author_detail' pk=author.pk %}">Cancel</a>
  </form>
{% endblock %}
